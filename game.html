<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflation Survivor</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark: #0e0e10;
            --card: #18181c;
            --border: #2e2e38;
            --red: #e63946;
            --gold: #f4c430;
            --green: #4caf7d;
            --text: #e8e6e1;
            --muted: #888898;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Prevent scrolling while playing */
        }

        /* ===== Top Nav ===== */
        .top-nav {
            background: #09090b;
            padding: 0.85rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .top-nav .brand { color: var(--green); font-weight: 900; font-size: 1.05rem; text-decoration: none; letter-spacing: 0.06em; }
        .top-nav a { color: var(--muted); font-size: 0.85rem; text-decoration: none; }
        .top-nav a:hover { color: var(--text); }

        /* ===== Game Container ===== */
        .game-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 1rem;
        }

        canvas {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }

        /* ===== UI Overlays ===== */
        .ui-layer {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            max-width: 95%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            padding: 0 1rem;
        }

        .stat-box {
            background: rgba(24, 24, 28, 0.8);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        .xp-bar-container {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 760px;
            max-width: 90%;
            height: 10px;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            pointer-events: none;
        }
        
        .xp-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--gold);
            transition: width 0.2s;
        }

        /* ===== Game Over Screen ===== */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(14, 14, 16, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            display: none;
        }

        .overlay-screen h1 {
            font-size: 3rem;
            color: var(--red);
            margin-bottom: 1rem;
        }

        .overlay-screen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--muted);
        }

        .btn {
            background: var(--green);
            color: var(--dark);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn:hover { background: #5cdb99; }
        .btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

<nav class="top-nav">
    <a href="scratch.html" class="brand">Inflation Survivor</a>
    <a href="scratch.html">← Back to Scratch Page</a>
</nav>

<div class="game-container">
    <div class="xp-bar-container"><div class="xp-bar-fill" id="xp-bar"></div></div>
    
    <div class="ui-layer">
        <div class="stat-box" style="color: var(--green);">Level: <span id="ui-level">1</span></div>
        <div class="stat-box" style="color: var(--text);">Time: <span id="ui-time">0:00</span></div>
        <div class="stat-box" style="color: var(--red);">HP: <span id="ui-hp">100</span>/100</div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="overlay-screen" id="game-over">
        <h1>BANKRUPT</h1>
        <p>You survived <span id="final-time" style="color:var(--text)">0:00</span> and reached Level <span id="final-level" style="color:var(--gold)">1</span>.</p>
        <button class="btn" onclick="startGame()">Restart Game</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI Elements
    const uiLevel = document.getElementById('ui-level');
    const uiHp = document.getElementById('ui-hp');
    const uiTime = document.getElementById('ui-time');
    const xpBar = document.getElementById('xp-bar');
    const gameOverScreen = document.getElementById('game-over');
    const finalTime = document.getElementById('final-time');
    const finalLevel = document.getElementById('final-level');

    // Input tracking
    const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
    
    window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
    window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

    // Game State
    let gameLoop;
    let frameCount = 0;
    let isGameOver = false;
    let startTime = 0;

    let player, enemies, projectiles, gems, particles;

    class Player {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.size = 15;
            this.speed = 3.5;
            this.maxHp = 100;
            this.hp = 100;
            
            this.level = 1;
            this.xp = 0;
            this.xpNeeded = 10;
            
            // Attack stats
            this.fireRate = 60; // shoots every X frames
            this.projectileSpeed = 7;
            this.damage = 25;
            this.attackTimer = 0;
            this.pickupRadius = 60;
        }

        update() {
            // Movement
            let dx = 0; let dy = 0;
            if (keys.w || keys.ArrowUp) dy -= 1;
            if (keys.s || keys.ArrowDown) dy += 1;
            if (keys.a || keys.ArrowLeft) dx -= 1;
            if (keys.d || keys.ArrowRight) dx += 1;

            // Normalize diagonal movement
            if (dx !== 0 && dy !== 0) {
                const length = Math.sqrt(dx*dx + dy*dy);
                dx /= length; dy /= length;
            }

            this.x += dx * this.speed;
            this.y += dy * this.speed;

            // Keep in bounds
            this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
            this.y = Math.max(this.size, Math.min(canvas.height - this.size, this.y));

            // Auto Attack
            this.attackTimer++;
            if (this.attackTimer >= this.fireRate) {
                this.shoot();
                this.attackTimer = 0;
            }
        }

        shoot() {
            if (enemies.length === 0) return;
            
            // Find nearest enemy
            let nearest = null;
            let minDist = Infinity;
            
            for (let enemy of enemies) {
                const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = enemy;
                }
            }

            if (nearest) {
                const angle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                projectiles.push(new Projectile(this.x, this.y, angle, this.projectileSpeed, this.damage));
                
                // At higher levels, shoot backwards too
                if (this.level >= 5) {
                    projectiles.push(new Projectile(this.x, this.y, angle + Math.PI, this.projectileSpeed, this.damage));
                }
            }
        }

        gainXp(amount) {
            this.xp += amount;
            if (this.xp >= this.xpNeeded) {
                this.xp -= this.xpNeeded;
                this.level++;
                this.xpNeeded = Math.floor(this.xpNeeded * 1.5);
                
                // Level up perks
                this.maxHp += 10;
                this.hp = this.maxHp;
                this.damage += 5;
                if (this.fireRate > 15) this.fireRate -= 5;
                this.pickupRadius += 10;
                
                createParticles(this.x, this.y, '#f4c430', 30);
                uiLevel.textContent = this.level;
            }
            updateUI();
        }

        takeDamage(amount) {
            this.hp -= amount;
            updateUI();
            if (this.hp <= 0) {
                endGame();
            }
        }

        draw() {
            ctx.fillStyle = '#4caf7d'; // Wallet green
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            
            // Draw pickup radius faintly
            ctx.strokeStyle = 'rgba(244, 196, 48, 0.1)';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.pickupRadius, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    class Enemy {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.size = type === 'tank' ? 18 : 12;
            this.speed = type === 'fast' ? 2.5 : type === 'tank' ? 0.8 : 1.2;
            this.hp = type === 'tank' ? 150 : 40;
            this.damage = type === 'tank' ? 15 : 5;
            this.color = type === 'fast' ? '#e89447' : '#e63946'; // Orange bills, Red inflation
        }

        update() {
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed;
            this.y += Math.sin(angle) * this.speed;

            // Check collision with player
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < this.size + player.size) {
                player.takeDamage(this.damage);
                this.hp = 0; // Enemy dies on impact
            }
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Projectile {
        constructor(x, y, angle, speed, damage) {
            this.x = x;
            this.y = y;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.size = 4;
            this.damage = damage;
            this.life = 100;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life--;
        }

        draw() {
            ctx.fillStyle = '#e8e6e1';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Gem {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 5;
            this.value = 5;
            this.collected = false;
        }

        update() {
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            
            // Magnet effect
            if (dist < player.pickupRadius) {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * 6;
                this.y += Math.sin(angle) * 6;
            }

            // Pickup
            if (dist < player.size + this.size) {
                player.gainXp(this.value);
                this.collected = true;
            }
        }

        draw() {
            ctx.fillStyle = '#f4c430'; // Gold
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.life = Math.random() * 20 + 10;
            this.color = color;
            this.size = Math.random() * 3 + 1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life--;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
    }

    function createParticles(x, y, color, amount=10) {
        for(let i=0; i<amount; i++) particles.push(new Particle(x, y, color));
    }

    function spawnEnemy() {
        // Spawn slightly outside canvas
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -30 : canvas.width + 30;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -30 : canvas.height + 30;
        }

        // Difficulty scaling over time
        const r = Math.random();
        let type = 'normal';
        if (frameCount > 600 && r < 0.2) type = 'fast';
        if (frameCount > 1200 && r > 0.8) type = 'tank';

        enemies.push(new Enemy(x, y, type));
    }

    function updateUI() {
        uiHp.textContent = Math.max(0, Math.floor(player.hp));
        xpBar.style.width = `${(player.xp / player.xpNeeded) * 100}%`;
    }

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function startGame() {
        player = new Player();
        enemies = [];
        projectiles = [];
        gems = [];
        particles = [];
        frameCount = 0;
        isGameOver = false;
        startTime = Date.now();
        
        gameOverScreen.style.display = 'none';
        uiLevel.textContent = player.level;
        updateUI();
        
        if(gameLoop) cancelAnimationFrame(gameLoop);
        loop();
    }

    function endGame() {
        isGameOver = true;
        const timeAlive = formatTime(Date.now() - startTime);
        finalTime.textContent = timeAlive;
        finalLevel.textContent = player.level;
        gameOverScreen.style.display = 'flex';
    }

    function loop() {
        if (isGameOver) return;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frameCount++;

        // Timer
        uiTime.textContent = formatTime(Date.now() - startTime);

        // Spawn logic (gets faster over time)
        const spawnRate = Math.max(10, 60 - Math.floor(frameCount / 300));
        if (frameCount % spawnRate === 0) spawnEnemy();

        // Update & Draw Player
        player.update();
        player.draw();

        // Projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.update();
            p.draw();
            if (p.life <= 0 || p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                projectiles.splice(i, 1);
            }
        }

        // Gems
        for (let i = gems.length - 1; i >= 0; i--) {
            let g = gems[i];
            g.update();
            g.draw();
            if (g.collected) gems.splice(i, 1);
        }

        // Enemies & Collisions
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.update();
            e.draw();

            // Check if hit by projectile
            for (let j = projectiles.length - 1; j >= 0; j--) {
                let p = projectiles[j];
                const dist = Math.hypot(e.x - p.x, e.y - p.y);
                if (dist < e.size + p.size) {
                    e.hp -= p.damage;
                    createParticles(p.x, p.y, '#e8e6e1', 5);
                    projectiles.splice(j, 1);
                    break;
                }
            }

            if (e.hp <= 0) {
                createParticles(e.x, e.y, e.color, 15);
                gems.push(new Gem(e.x, e.y));
                enemies.splice(i, 1);
            }
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let pt = particles[i];
            pt.update();
            pt.draw();
            if (pt.life <= 0) particles.splice(i, 1);
        }

        gameLoop = requestAnimationFrame(loop);
    }

    // Start
    startGame();
</script>

</body>
</html>
