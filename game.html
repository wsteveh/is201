<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inflation Survivor</title>
    <style>
        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --dark: #0e0e10;
            --card: #18181c;
            --border: #2e2e38;
            --red: #ff4d4d;
            --gold: #f4c430;
            --green: #4caf7d;
            --text: #e8e6e1;
            --muted: #888898;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== Top Nav ===== */
        .top-nav {
            background: #09090b;
            padding: 0.85rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .top-nav .brand { color: var(--green); font-weight: 900; font-size: 1.05rem; text-decoration: none; letter-spacing: 0.06em; }
        .top-nav a { color: var(--muted); font-size: 0.85rem; text-decoration: none; }
        .top-nav a:hover { color: var(--text); }

        /* ===== Game Container ===== */
        .game-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 1rem;
        }

        canvas {
            background: #121418; 
            border: 2px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }

        /* ===== UI Overlays ===== */
        .ui-layer {
            position: absolute;
            top: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            max-width: 95%;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            padding: 0 1rem;
        }

        .stat-box {
            background: rgba(24, 24, 28, 0.85);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: bold;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-box span { font-size: 1.1rem; }

        .xp-bar-container {
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            width: 760px;
            max-width: 90%;
            height: 12px;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            pointer-events: none;
        }
        
        .xp-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #b8860b, var(--gold));
            transition: width 0.2s;
        }

        .level-up-text {
            position: absolute;
            top: 20%;
            color: var(--gold);
            font-size: 2rem;
            font-weight: 900;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 15;
        }

        /* ===== Game Over Screen ===== */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(14, 14, 16, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            display: none;
        }

        .overlay-screen h1 {
            font-size: 4rem;
            color: var(--red);
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(230, 57, 70, 0.4);
        }

        .overlay-screen p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: var(--muted);
            text-align: center;
            line-height: 1.6;
        }

        .btn {
            background: var(--green);
            color: var(--dark);
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:hover { background: #5cdb99; }
        .btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

<nav class="top-nav">
    <a href="scratch.html" class="brand">Inflation Survivor</a>
    <a href="scratch.html">← Back to Scratch Page</a>
</nav>

<div class="game-container">
    <div class="xp-bar-container"><div class="xp-bar-fill" id="xp-bar"></div></div>
    
    <div class="ui-layer">
        <div class="stat-box" style="color: var(--gold);">Portfolio Level: <span id="ui-level">1</span></div>
        <div class="stat-box" style="color: var(--text);">Fiscal Year: <span id="ui-time">0:00</span></div>
        <div class="stat-box" style="color: var(--green);">Funds: $<span id="ui-hp">1000</span></div>
    </div>

    <!-- UI Toasts -->
    <div id="level-up-toast" class="level-up-text">📈 Compound Interest Applied!</div>
    <div id="boss-toast" class="level-up-text" style="color: var(--red); top: 30%; font-size: 2.5rem; text-shadow: 0 4px 20px rgba(230, 57, 70, 0.9);">⚠️ BEAR MARKET DETECTED ⚠️</div>
    <div id="bull-toast" class="level-up-text" style="color: var(--green); top: 35%; font-size: 2.5rem; text-shadow: 0 4px 20px rgba(76, 175, 125, 0.9);">🚀 BULL MARKET! CATCH IT! 🚀</div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="overlay-screen" id="game-over">
        <h1>BANKRUPT</h1>
        <p>Your wallet succumbed to endless inflation.<br>You survived <span id="final-time" style="color:var(--text)">0:00</span> and built a Portfolio Level of <span id="final-level" style="color:var(--gold)">1</span>.</p>
        <button class="btn" onclick="startGame()">Bailout (Restart)</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // UI Elements
    const uiLevel = document.getElementById('ui-level');
    const uiHp = document.getElementById('ui-hp');
    const uiTime = document.getElementById('ui-time');
    const xpBar = document.getElementById('xp-bar');
    const gameOverScreen = document.getElementById('game-over');
    const finalTime = document.getElementById('final-time');
    const finalLevel = document.getElementById('final-level');
    const levelUpToast = document.getElementById('level-up-toast');
    const bossToast = document.getElementById('boss-toast');
    const bullToast = document.getElementById('bull-toast');

    // Input tracking
    const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
    window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
    window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

    // Game State
    let gameLoop;
    let frameCount = 0;
    let isGameOver = false;
    let startTime = 0;
    let lastBossLevel = 0;

    let player, enemies, projectiles, gems, particles, floatingTexts;

    class Player {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.size = 18; 
            this.speed = 3.5;
            this.maxHp = 1000;
            this.hp = 1000;
            
            this.level = 1;
            this.xp = 0;
            this.xpNeeded = 10;
            
            this.fireRate = 50; 
            this.projectileSpeed = 8;
            this.damage = 30;
            this.attackTimer = 0;
            this.pickupRadius = 75;
        }

        update() {
            let dx = 0; let dy = 0;
            if (keys.w || keys.ArrowUp) dy -= 1;
            if (keys.s || keys.ArrowDown) dy += 1;
            if (keys.a || keys.ArrowLeft) dx -= 1;
            if (keys.d || keys.ArrowRight) dx += 1;

            if (dx !== 0 && dy !== 0) {
                const length = Math.sqrt(dx*dx + dy*dy);
                dx /= length; dy /= length;
            }

            this.x += dx * this.speed;
            this.y += dy * this.speed;

            this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
            this.y = Math.max(this.size, Math.min(canvas.height - this.size, this.y));

            this.attackTimer++;
            if (this.attackTimer >= this.fireRate) {
                this.shoot();
                this.attackTimer = 0;
            }
        }

        shoot() {
            if (enemies.length === 0) return;
            
            let nearest = null;
            let minDist = Infinity;
            
            for (let enemy of enemies) {
                // Prioritize shooting enemies on screen
                if(enemy.x < 0 || enemy.x > canvas.width || enemy.y < 0 || enemy.y > canvas.height) continue;
                
                const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = enemy;
                }
            }

            if (nearest) {
                const angle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                projectiles.push(new Projectile(this.x, this.y, angle, this.projectileSpeed, this.damage));
                
                if (this.level >= 4) projectiles.push(new Projectile(this.x, this.y, angle + Math.PI, this.projectileSpeed, this.damage));
                if (this.level >= 8) projectiles.push(new Projectile(this.x, this.y, angle + Math.PI/2, this.projectileSpeed, this.damage));
                if (this.level >= 12) projectiles.push(new Projectile(this.x, this.y, angle - Math.PI/2, this.projectileSpeed, this.damage));
            }
        }

        gainXp(amount) {
            this.xp += amount;
            
            while (this.xp >= this.xpNeeded) {
                this.xp -= this.xpNeeded;
                this.level++;
                this.xpNeeded = Math.floor(this.xpNeeded * 1.5);
                
                this.maxHp += 50;
                this.hp += this.maxHp * 0.25; 
                if (this.hp > this.maxHp) this.hp = this.maxHp;
                
                this.damage += 8;
                if (this.fireRate > 12) this.fireRate -= 4;
                this.pickupRadius += 10;
                
                createParticles(this.x, this.y, '#f4c430', 40);
                uiLevel.textContent = this.level;
                
                levelUpToast.style.opacity = 1;
                setTimeout(() => levelUpToast.style.opacity = 0, 2000);

                if (this.level % 5 === 0 && this.level !== 5 && lastBossLevel !== this.level) {
                    lastBossLevel = this.level;
                    spawnBoss();
                }
            }
            updateUI();
        }

        takeDamage(amount) {
            this.hp -= amount;
            floatingTexts.push(new FloatingText(this.x, this.y - 20, `-$${Math.floor(amount)}`, '#ff4d4d'));
            uiHp.style.color = this.hp < this.maxHp * 0.3 ? 'var(--red)' : 'var(--green)';
            updateUI();
            if (this.hp <= 0) endGame();
        }

        draw() {
            ctx.font = '32px Arial';
            ctx.fillText('👛', this.x, this.y); 
            
            ctx.strokeStyle = 'rgba(244, 196, 48, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.pickupRadius, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    class Enemy {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.isBoss = false;

            // Restored the scaling so the game actually pushes back!
            const diffScale = 1; 
            const dmgScale = 1;  
            
            if (type === 'boss') {
                this.emoji = '🐻'; 
                this.size = 45 * (1 + player.level / 50);
                this.speed = 1.05 + (player.level * 0.02);
                this.hp = 2000 * Math.pow(1.5, player.level / 5); 
                this.damage = 300 * dmgScale;
                this.isBoss = true;
            } else if (type === 'bull') {
                this.emoji = '🐂'; 
                this.size = 35;
                this.speed = 1.4; // Fast enough you have to chase it
                this.hp = 3500 + (player.level * 100); 
                this.damage = 0; // Bulls don't hurt you
            } else if (type === 'guard') {
                this.emoji = '💼'; // Regulators / Auditors
                this.size = 20;
                this.speed = 2.2; // Extremely fast to intercept you
                this.hp = 500 * diffScale; 
                this.damage = 80 * dmgScale;
            } else if (type === 'tank') {
                this.emoji = '📈'; 
                this.size = 22;
                this.speed = 0.9;
                this.hp = 180 * diffScale;
                this.damage = 150 * dmgScale;
            } else if (type === 'fast') {
                this.emoji = '🛒'; 
                this.size = 14;
                this.speed = 2.8;
                this.hp = 30 * diffScale;
                this.damage = 40 * dmgScale;
            } else {
                this.emoji = '🧾'; 
                this.size = 16;
                this.speed = 1.4;
                this.hp = 50 * diffScale;
                this.damage = 60 * dmgScale;
            }
        }

        update() {
            if (this.type === 'bull') {
                // Bull ignores player and runs across the screen
                this.x += this.vx;
                this.y += this.vy;

                // Despawn cleanly without dropping loot if it escapes bounds
                if (this.x < -200 || this.x > canvas.width + 200 || this.y < -200 || this.y > canvas.height + 200) {
                    this.hp = -999; 
                }
            } else {
                // Normal enemies chase the player
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed;
                this.y += Math.sin(angle) * this.speed;

                const dist = Math.hypot(player.x - this.x, player.y - this.y);
                if (dist < this.size + player.size - 5) { 
                    player.takeDamage(this.damage);
                    this.hp = 0; 
                }
            }
        }

        draw() {
            ctx.font = `${this.size * 2}px Arial`;
            ctx.fillText(this.emoji, this.x, this.y);
        }
    }

    class Projectile {
        constructor(x, y, angle, speed, damage) {
            this.x = x; this.y = y;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            this.size = 10;
            this.damage = damage;
            this.life = 100;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life--; }
        draw() {
            ctx.fillStyle = '#85bb65'; 
            ctx.font = 'bold 20px Arial';
            ctx.fillText('$', this.x, this.y);
        }
    }

    class Gem {
        constructor(x, y, value = 5) {
            this.x = x; this.y = y;
            this.size = value;
            this.value = value;
            this.collected = false;
        }

        update() {
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < player.pickupRadius) {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * 7;
                this.y += Math.sin(angle) * 7;
            }
            if (dist < player.size + this.size) {
                player.gainXp(this.value);
                floatingTexts.push(new FloatingText(this.x, this.y, '+$', '#f4c430'));
                this.collected = true;
            }
        }

        draw() {
            ctx.font = `${this.size * 1.6}px Arial`;
            ctx.fillText('🪙', this.x, this.y);
        }
    }

    class FloatingText {
        constructor(x, y, text, color) {
            this.x = x + (Math.random() * 20 - 10);
            this.y = y;
            this.text = text;
            this.color = color;
            this.life = 40;
            this.vy = -0.8;
        }
        update() { this.y += this.vy; this.life--; }
        draw() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = Math.max(0, this.life / 40);
            ctx.font = 'bold 16px Arial';
            ctx.fillText(this.text, this.x, this.y);
            ctx.globalAlpha = 1.0;
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8;
            this.life = Math.random() * 20 + 10;
            this.maxLife = this.life;
            this.color = color;
            this.size = Math.random() * 4 + 2;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life--; }
        draw() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1.0;
        }
    }

    function createParticles(x, y, color, amount=10) {
        for(let i=0; i<amount; i++) particles.push(new Particle(x, y, color));
    }

    function spawnBoss() {
        let x = Math.random() < 0.5 ? -60 : canvas.width + 60;
        let y = Math.random() * canvas.height;
        enemies.push(new Enemy(x, y, 'boss'));
        
        bossToast.style.opacity = 1;
        setTimeout(() => bossToast.style.opacity = 0, 3500);
    }

    function spawnBullEvent() {
        let startX, startY, targetX, targetY;
        
        // Pick a side to spawn, and aim towards the opposite side
        if (Math.random() < 0.5) { 
            startX = Math.random() < 0.5 ? -50 : canvas.width + 50;
            startY = Math.random() * canvas.height;
            targetX = startX < 0 ? canvas.width + 50 : -50;
            targetY = Math.random() * canvas.height;
        } else { 
            startX = Math.random() * canvas.width;
            startY = Math.random() < 0.5 ? -50 : canvas.height + 50;
            targetX = Math.random() * canvas.width;
            targetY = startY < 0 ? canvas.height + 50 : -50;
        }

        let bull = new Enemy(startX, startY, 'bull');
        const angle = Math.atan2(targetY - startY, targetX - startX);
        bull.vx = Math.cos(angle) * 1.5; 
        bull.vy = Math.sin(angle) * 1.5;
        enemies.push(bull);

        // Spawn Regulators acting as a wall around the Bull
        for(let i=0; i<5; i++) {
            let gx = startX + Math.cos((i/5) * Math.PI * 2) * 60;
            let gy = startY + Math.sin((i/5) * Math.PI * 2) * 60;
            enemies.push(new Enemy(gx, gy, 'guard'));
        }

        bullToast.style.opacity = 1;
        setTimeout(() => bullToast.style.opacity = 0, 3500);
    }

    function spawnEnemy() {
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -40 : canvas.width + 40;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -40 : canvas.height + 40;
        }

        const r = Math.random();
        let type = 'normal';
        if (frameCount > 500 && r < 0.25) type = 'fast';
        if (frameCount > 1000 && r > 0.8) type = 'tank';

        enemies.push(new Enemy(x, y, type));
    }

    function updateUI() {
        uiHp.textContent = Math.max(0, Math.floor(player.hp));
        xpBar.style.width = `${(player.xp / player.xpNeeded) * 100}%`;
    }

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function drawLedgerBackground() {
        ctx.fillStyle = '#121418';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#1e2025';
        ctx.lineWidth = 1;
        for(let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i = 0; i < canvas.height; i += 40) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }
        ctx.strokeStyle = 'rgba(230, 57, 70, 0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(80, 0); ctx.lineTo(80, canvas.height); ctx.stroke();
    }

    function startGame() {
        player = new Player();
        enemies = []; projectiles = []; gems = []; particles = []; floatingTexts = [];
        frameCount = 0; isGameOver = false; startTime = Date.now(); lastBossLevel = 0;
        
        gameOverScreen.style.display = 'none';
        uiHp.style.color = 'var(--green)';
        uiLevel.textContent = player.level;
        levelUpToast.style.opacity = 0;
        bossToast.style.opacity = 0;
        bullToast.style.opacity = 0;
        updateUI();
        
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        if(gameLoop) cancelAnimationFrame(gameLoop);
        loop();
    }

    function endGame() {
        isGameOver = true;
        const timeAlive = formatTime(Date.now() - startTime);
        finalTime.textContent = timeAlive;
        finalLevel.textContent = player.level;
        gameOverScreen.style.display = 'flex';
    }

    function loop() {
        if (isGameOver) return;
        
        drawLedgerBackground();
        frameCount++;

        uiTime.textContent = formatTime(Date.now() - startTime);

        // Spawn logic
        const spawnRate = Math.max(8, 50 - Math.floor(frameCount / 250));
        if (frameCount % spawnRate === 0) spawnEnemy();

        // Spawn Bull Market every ~15 seconds once past level 16
        if (frameCount % 1800 === 0 && player.level >= 16) {
            spawnBullEvent();
        }

        player.update();
        player.draw();

        const entities = [
            { arr: projectiles, action: (p, i) => {
                p.update(); p.draw();
                if (p.life <= 0 || p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) projectiles.splice(i, 1);
            }},
            { arr: gems, action: (g, i) => {
                g.update(); g.draw();
                if (g.collected) gems.splice(i, 1);
            }},
            { arr: enemies, action: (e, i) => {
                e.update(); e.draw();
                
                // Projectile Collision
                for (let j = projectiles.length - 1; j >= 0; j--) {
                    let p = projectiles[j];
                    if (Math.hypot(e.x - p.x, e.y - p.y) < e.size + p.size) {
                        e.hp -= p.damage;
                        createParticles(p.x, p.y, '#e8e6e1', 5);
                        floatingTexts.push(new FloatingText(e.x, e.y, p.damage, '#fff'));
                        projectiles.splice(j, 1);
                        break;
                    }
                }

                // Death Logic
                if (e.hp <= 0) {
                    // If hp is -999, it escaped bounds cleanly, no loot
                    if (e.hp !== -999) {
                        createParticles(e.x, e.y, '#888', e.isBoss ? 50 : 10);
                        
                        if (e.isBoss) {
                            for(let k = 0; k < 25; k++) {
                                let gx = e.x + (Math.random() * 80 - 40);
                                let gy = e.y + (Math.random() * 80 - 40);
                                gems.push(new Gem(gx, gy, 15*(1+player.level/25)));
                            }
                        } else if (e.type === 'bull') {
                            // Bull detonates into a massive pile of gems
                            for(let k = 0; k < 40; k++) {
                                let gx = e.x + (Math.random() * 120 - 60);
                                let gy = e.y + (Math.random() * 120 - 60);
                                gems.push(new Gem(gx, gy, 25*(1+player.level/8)));
                            }
                        } else {
                            gems.push(new Gem(e.x, e.y, 5*(1+player.level/40)));
                        }
                    }
                    enemies.splice(i, 1);
                }
            }},
            { arr: particles, action: (pt, i) => { pt.update(); pt.draw(); if (pt.life <= 0) particles.splice(i, 1); }},
            { arr: floatingTexts, action: (ft, i) => { ft.update(); ft.draw(); if (ft.life <= 0) floatingTexts.splice(i, 1); }}
        ];

        entities.forEach(group => {
            for (let i = group.arr.length - 1; i >= 0; i--) group.action(group.arr[i], i);
        });

        gameLoop = requestAnimationFrame(loop);
    }

    startGame();
</script>
